<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Lens v2.0</title>
    <style>
        :root { --neon: #39FF14; }
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        
        /* The Pulsing Neon Perimeter (3-Second Cycle) */
        #perimeter { 
            position: fixed; inset: 0; border: 4px solid var(--neon); 
            pointer-events: none; z-index: 1000;
            animation: pulseColor 12s infinite; 
        }
        @keyframes pulseColor {
            0%, 25% { border-color: #39FF14; } /* Green */
            26%, 50% { border-color: #00F3FF; } /* Blue */
            51%, 75% { border-color: #FF073A; } /* Red */
            76%, 100% { border-color: #FFF000; } /* Yellow */
        }

        /* The Document World */
        #viewport { width: 100vw; height: 100vh; display: flex; align-items: flex-start; justify-content: center; }
        #canvas-wrap { position: relative; transform-origin: top center; }
        canvas { display: block; max-width: 100%; height: auto; }

        /* The Magic Stamp (Floating Pen) */
        #stamp { 
            position: absolute; z-index: 500; color: #000; 
            background: rgba(255, 255, 255, 0.4); border: 1px dashed rgba(0,0,0,0.5);
            padding: 10px; cursor: move; touch-action: none;
            display: inline-block; white-space: nowrap; font-weight: bold;
            border-radius: 4px;
        }

        /* Glassmorphic Organic Buttons */
        #ui-layer { position: fixed; bottom: 20px; width: 100%; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; z-index: 1100; pointer-events: none; }
        .glass-pill { 
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px; border-radius: 50px; 
            color: #fff; font-size: 12px; font-weight: bold;
            text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-save { background: rgba(57, 255, 20, 0.2); border: 1px solid var(--neon); }
        
        #sig-zone { 
            position: fixed; top: 20%; left: 5%; width: 90%; height: 35%; 
            background: white; border-radius: 20px; z-index: 2000; display: none; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #hiddenText { position: fixed; top: -100px; opacity: 0; }
        #sliders { position: fixed; top: 60px; width: 80%; left: 10%; z-index: 1100; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        input[type="range"] { pointer-events: auto; width: 100%; accent-color: var(--neon); }
    </style>
</head>
<body>

<div id="perimeter"></div>
<input type="text" id="hiddenText">

<div id="sig-zone">
    <canvas id="sigCanvas" style="width:100%; height:100%; touch-action:none;"></canvas>
    <div style="position:absolute; bottom:15px; width:100%; display:flex; justify-content:center; gap:10px;">
        <button class="glass-pill btn-save" onclick="finishSig(true)">STAMP</button>
        <button class="glass-pill" onclick="finishSig(false)">X</button>
    </div>
</div>

<div id="sliders">
    <input type="range" id="fSize" min="10" max="800" value="40" oninput="sync()">
    <input type="range" id="fRot" min="-180" max="180" value="0" oninput="sync()">
</div>

<div id="viewport">
    <div id="canvas-wrap" id="wrap">
        <canvas id="mainDoc"></canvas>
        <div id="stamp">DOUBLE TAP TO TYPE</div>
    </div>
</div>

<div id="ui-layer">
    <button class="glass-pill" onclick="document.getElementById('fileIn').click()">LOAD</button>
    <input type="file" id="fileIn" hidden accept="image/*">
    <button class="glass-pill" onclick="toggleSign()">SIGN</button>
    <button class="glass-pill" onclick="undoInk()">UNDO</button>
    <button class="glass-pill btn-save" onclick="burnAndSave()">SAVE AS</button>
</div>

<script>
    const canvas = document.getElementById('mainDoc'), ctx = canvas.getContext('2d');
    const wrap = document.getElementById('canvas-wrap'), stamp = document.getElementById('stamp');
    const hInput = document.getElementById('hiddenText'), sCanvas = document.getElementById('sigCanvas'), sCtx = sCanvas.getContext('2d');
    
    let baseImg = new Image(), zoom = 1.0, history = [], posX = 50, posY = 50, sigImg = null;
    let inkText = "DOUBLE TAP";

    // 1. Natural Edge-to-Edge Loading
    document.getElementById('fileIn').onchange = e => {
        const reader = new FileReader();
        reader.onload = f => { 
            baseImg.src = f.target.result; 
            baseImg.onload = () => { 
                canvas.width = baseImg.width; canvas.height = baseImg.height; 
                saveState(); render(); 
            }; 
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(baseImg, 0, 0); sync(); }

    // 2. Smooth One-Finger Drag
    stamp.addEventListener('touchstart', e => { if(e.touches.length === 1) e.preventDefault(); }, {passive: false});
    stamp.addEventListener('touchmove', e => {
        const t = e.touches[0], r = canvas.getBoundingClientRect();
        posX = (t.pageX - r.left)/zoom - (stamp.offsetWidth/2);
        posY = (t.pageY - r.top)/zoom - (stamp.offsetHeight/2);
        stamp.style.left = posX + "px"; stamp.style.top = posY + "px";
    });

    // 3. Double-Tap to Focus Typing
    let lastTap = 0;
    stamp.addEventListener('touchend', () => {
        const now = Date.now();
        if(now - lastTap < 300) hInput.focus();
        lastTap = now;
    });
    hInput.oninput = () => { inkText = hInput.value; sigImg = null; sync(); };

    // 4. Smooth Pinch-to-Zoom (Doc Only)
    let startDist = 0;
    document.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if (startDist > 0) {
                zoom = Math.max(0.05, zoom + (d > startDist ? 0.015 : -0.015));
                sync();
            }
            startDist = d;
        }
    }, { passive: false });
    document.addEventListener('touchend', () => startDist = 0);

    // 5. Signature Logic
    function toggleSign() { document.getElementById('sig-zone').style.display = 'block'; sCanvas.width = sCanvas.offsetWidth; sCanvas.height = sCanvas.offsetHeight; sCtx.clearRect(0,0,sCanvas.width,sCanvas.height); }
    let drawing = false;
    sCanvas.addEventListener('touchstart', (e) => { drawing = true; sCtx.beginPath(); const r = sCanvas.getBoundingClientRect(); sCtx.moveTo(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
    sCanvas.addEventListener('touchmove', (e) => { 
        if(!drawing) return; e.preventDefault();
        const r = sCanvas.getBoundingClientRect();
        sCtx.lineWidth = 4; sCtx.lineCap = 'round'; sCtx.strokeStyle = '#000';
        sCtx.lineTo(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); sCtx.stroke();
    });
    function finishSig(keep) {
        if(keep) { sigImg = new Image(); sigImg.src = sCanvas.toDataURL(); stamp.innerHTML = ''; stamp.appendChild(sigImg); }
        document.getElementById('sig-zone').style.display = 'none'; drawing = false;
    }

    function sync() {
        const sz = document.getElementById('fSize').value, rt = document.getElementById('fRot').value;
        wrap.style.transform = `scale(${zoom})`;
        if(!sigImg) stamp.innerText = inkText;
        stamp.style.fontSize = sz + "px"; stamp.style.transform = `rotate(${rt}deg)`;
    }

    // 6. The Burn & Save Logic
    function burnAndSave() {
        if(!baseImg.src) return;
        saveState();
        const sz = document.getElementById('fSize').value, rt = document.getElementById('fRot').value * Math.PI / 180;
        ctx.save();
        ctx.translate(posX + stamp.offsetWidth/2, posY + stamp.offsetHeight/2);
        ctx.rotate(rt);
        if(sigImg) {
            ctx.drawImage(sigImg, -stamp.offsetWidth/2, -stamp.offsetHeight/2, stamp.offsetWidth, stamp.offsetHeight);
            sigImg = null; stamp.innerHTML = '';
        } else {
            ctx.font = `bold ${sz}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(inkText, 0, 0);
        }
        ctx.restore();
        baseImg.src = canvas.toDataURL(); // Update internal twin
        
        // Immediate Save As
        const link = document.createElement('a');
        link.download = `Sovereign_Lens_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
        
        hInput.value = ""; inkText = "NEXT STAMP"; sync();
    }

    function saveState() { history.push(canvas.toDataURL()); if(history.length > 20) history.shift(); }
    function undoInk() { if(history.length > 1) { history.pop(); baseImg.src = history[history.length-1]; baseImg.onload = () => render(); } }
</script>
</body>
</html>
