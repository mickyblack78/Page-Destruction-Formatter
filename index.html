<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Stamper v1.8</title>
    <style>
        :root { --neon: #39FF14; --bg: #111; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: monospace; overflow: hidden; touch-action: none; }
        
        /* The Neon Perimeter (User Choice) */
        #house { position: fixed; inset: 5px; border: 3px solid var(--neon); pointer-events: none; z-index: 50; transition: border-color 0.3s; }
        
        #hud { position: fixed; top: 8px; width: 100%; display: flex; justify-content: space-around; font-size: 10px; z-index: 100; text-shadow: 1px 1px #000; }
        
        #workspace { width: 100vw; height: 100vh; overflow: auto; background: #222; position: relative; }
        #canvas-wrap { position: absolute; transform-origin: 0 0; top: 45px; left: 10px; }
        canvas { background: white; display: block; }

        /* The Ghost Pen (Movable/Stretchable) */
        #plate { 
            position: absolute; z-index: 200; color: #000; 
            background: rgba(255, 255, 255, 0.3); border: 1px dashed #555;
            padding: 5px; cursor: move; touch-action: none;
            display: inline-block; white-space: nowrap; font-weight: bold;
        }

        #sigPad { 
            position: fixed; top: 20%; left: 10%; width: 80%; height: 30%; 
            background: #fff; border: 2px solid var(--neon); z-index: 300; display: none; 
        }

        #controls { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--neon); padding: 10px 5px 20px 5px; display: flex; flex-direction: column; gap: 6px; z-index: 400; }
        .row { display: flex; gap: 4px; overflow-x: auto; padding: 2px; }
        
        button, input { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 10px; font-size: 12px; border-radius: 4px; flex-shrink: 0; }
        #textInput { flex-grow: 1; min-width: 100px; }
    </style>
</head>
<body>

<div id="house"></div>
<div id="hud">F: <b id="hudF">24</b> | Z: <b id="hudZ">1.0</b> | R: <b id="hudR">0</b>°</div>

<div id="sigPad">
    <canvas id="sigCanvas" style="width:100%; height:100%; background:transparent;"></canvas>
    <div style="position:absolute; bottom:5px; right:5px;">
        <button onclick="closeSig(true)">STAMP SIG</button>
        <button onclick="closeSig(false)" style="color:red">X</button>
    </div>
</div>

<div id="workspace">
    <div id="canvas-wrap" id="wrap">
        <canvas id="mainCanvas"></canvas>
        <div id="plate">DRAG ME</div>
    </div>
</div>

<div id="controls">
    <div class="row">
        <input type="text" id="textInput" placeholder="Ink..." oninput="update()">
        <button onclick="stamp()" style="background:var(--neon); color:#000;">BURN</button>
        <button onclick="toggleSig()">SIGN</button>
    </div>
    <div class="row">
        Size: <input type="range" id="fSize" min="10" max="200" value="24" oninput="update()">
        Tilt: <input type="range" id="rot" min="-180" max="180" value="0" oninput="update()">
    </div>
    <div class="row">
        <button onclick="cycleNeon()">GLOW</button>
        <button onclick="document.getElementById('loader').click()">LOAD</button>
        <input type="file" id="loader" hidden accept="image/*">
        <button onclick="changeZoom(0.2)">Z+</button>
        <button onclick="changeZoom(-0.2)">Z-</button>
        <button onclick="undo()">UNDO</button>
        <button onclick="exportImg()">EXPORT</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    const wrap = document.getElementById('canvas-wrap'), plate = document.getElementById('plate');
    const house = document.getElementById('house'), textInput = document.getElementById('textInput');
    const sCanvas = document.getElementById('sigCanvas'), sCtx = sCanvas.getContext('2d');
    
    let docImg = new Image(), zoom = 1.0, history = [], posX = 20, posY = 20, sigImg = null;
    const colors = ['#39FF14', '#00F3FF', '#FF073A', '#FFF000'];
    let cIdx = 0;

    // Cycle Neon Border
    function cycleNeon() { cIdx = (cIdx + 1) % colors.length; document.documentElement.style.setProperty('--neon', colors[cIdx]); }

    // Floating Plate Movement
    plate.addEventListener('touchstart', e => e.preventDefault());
    plate.addEventListener('touchmove', e => {
        const t = e.touches[0], r = canvas.getBoundingClientRect();
        posX = (t.pageX - r.left)/zoom - (plate.offsetWidth/2);
        posY = (t.pageY - r.top)/zoom - (plate.offsetHeight/2);
        plate.style.left = posX + "px"; plate.style.top = posY + "px";
    });

    // Signature Logic
    function toggleSig() { document.getElementById('sigPad').style.display = 'block'; sCanvas.width = sCanvas.offsetWidth; sCanvas.height = sCanvas.offsetHeight; }
    let drawing = false;
    sCanvas.addEventListener('touchstart', () => drawing = true);
    sCanvas.addEventListener('touchend', () => drawing = false);
    sCanvas.addEventListener('touchmove', e => {
        if(!drawing) return;
        const t = e.touches[0], r = sCanvas.getBoundingClientRect();
        sCtx.lineWidth = 3; sCtx.lineCap = 'round'; sCtx.strokeStyle = '#000';
        sCtx.lineTo(t.clientX - r.left, t.clientY - r.top); sCtx.stroke(); sCtx.beginPath(); sCtx.moveTo(t.clientX - r.left, t.clientY - r.top);
    });
    function closeSig(keep) {
        if(keep) { sigImg = new Image(); sigImg.src = sCanvas.toDataURL(); plate.innerHTML = ''; plate.appendChild(sigImg); }
        document.getElementById('sigPad').style.display = 'none'; sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
    }

    // Load & Draw
    document.getElementById('loader').onchange = e => {
        const r = new FileReader();
        r.onload = f => { docImg.src = f.target.result; docImg.onload = () => { canvas.width = docImg.width; canvas.height = docImg.height; saveHistory(); draw(); }; };
        r.readAsDataURL(e.target.files[0]);
    };
    function draw() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(docImg, 0, 0); update(); }
    function update() {
        const s = document.getElementById('fSize').value, r = document.getElementById('rot').value;
        document.getElementById('hudF').innerText = s; document.getElementById('hudZ').innerText = zoom.toFixed(1); document.getElementById('hudR').innerText = r;
        wrap.style.transform = `scale(${zoom})`;
        if(!sigImg) plate.innerText = textInput.value || "DRAG ME";
        plate.style.fontSize = s + "px"; plate.style.transform = `rotate(${r}deg)`;
    }

    function stamp() {
        if(!docImg.src) return; saveHistory();
        const s = document.getElementById('fSize').value, r = document.getElementById('rot').value * Math.PI / 180;
        ctx.save(); ctx.translate(posX + plate.offsetWidth/2, posY + plate.offsetHeight/2); ctx.rotate(r);
        if(sigImg) { ctx.drawImage(sigImg, -plate.offsetWidth/2, -plate.offsetHeight/2, plate.offsetWidth, plate.offsetHeight); sigImg = null; plate.innerHTML = ''; }
        else { ctx.font = `bold ${s}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(textInput.value, 0, 0); }
        ctx.restore(); docImg.src = canvas.toDataURL(); textInput.value = ""; update();
    }

    function changeZoom(v) { zoom = Math.max(0.1, zoom + v); update(); }
    function saveHistory() { history.push(canvas.toDataURL()); if(history.length > 10) history.shift(); }
    function undo() { if(history.length > 1) { history.pop(); docImg.src = history[history.length-1]; docImg.onload = () => draw(); } }
    function exportImg() { const a = document.createElement('a'); a.download = "Sovereign_Doc.png"; a.href = canvas.toDataURL(); a.click(); }
</script>
</body>
</html>
